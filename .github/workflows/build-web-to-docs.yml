name: Build Godot + Deploy to Firebase

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install npm dependencies
        run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install GDScript Formatter
        run: pip3 install "gdtoolkit==4.*"

      # - name: Run Source Formatter Check
      #   run: |
      #     chmod +x ./ci/check-format-source.sh
      #     ./ci/check-format-source.sh


      - name: Download Godot 4.6
        run: |
          mkdir -p godot-bin
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip
          unzip -q Godot_v4.6-stable_linux.x86_64.zip -d godot-bin
          chmod +x godot-bin/Godot_v4.6-stable_linux.x86_64

      - name: Download Godot 4.6 Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable
          cd ~/.local/share/godot/export_templates/4.6.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz
          unzip -q -j Godot_v4.6-stable_export_templates.tpz -d .

      - name: Export Godot Project to Web
        run: |
          mkdir -p ./docs
          ./godot-bin/Godot_v4.6-stable_linux.x86_64 --headless --path ./godot --export-debug "Web" ../docs/index.html
          echo "=== Exported files ==="
          ls -la ./docs

      - name: Create .nojekyll
        run: touch ./docs/.nojekyll

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -n "$FIREBASE_TOKEN" ]; then
            firebase deploy --only hosting --project guay-app-social --token "$FIREBASE_TOKEN"
            echo "✅ Deployed to Firebase Hosting"
          else
            echo "⚠️ FIREBASE_TOKEN not set, skipping Firebase deploy"
          fi

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload to GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4