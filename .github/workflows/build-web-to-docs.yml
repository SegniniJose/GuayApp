name: Build Godot + Deploy to Firebase

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install npm dependencies
        run: npm ci

      - name: Install GDScript Formatter
        run: pip3 install "gdtoolkit==4.*"

      - name: Run Source Formatter Check
        run: ./ci/check-format-source.sh

      - name: Download Godot 4.5
        run: |
          mkdir -p godot-bin
          wget -q https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_linux.x86_64.zip
          unzip -q Godot_v4.5-stable_linux.x86_64.zip -d godot-bin
          chmod +x godot-bin/Godot_v4.5-stable_linux.x86_64

      - name: Download Godot Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.5.stable
          cd ~/.local/share/godot/export_templates/4.5.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_export_templates.tpz
          unzip -q -j Godot_v4.5-stable_export_templates.tpz -d .

      - name: Export Godot Project to Web
        run: |
          mkdir -p ./docs
          ./godot-bin/Godot_v4.5-stable_linux.x86_64 --headless --path ./godot --export-debug "Web" ../docs/index.html
          ls -la ./docs

      - name: Copy admin panel to docs
        run: |
          cp ./docs/admin.html ./docs/admin.html 2>/dev/null || true

      - name: Create .nojekyll for GitHub Pages fallback
        run: touch ./docs/.nojekyll

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only hosting --project guay-app-social --token "$FIREBASE_TOKEN"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

permissions:
  contents: read
  pages: write
  id-token: write